<body>

  <div class="booking-card">
    <h3 class="text-center title-header">Ticket Booking Details</h3>
    
    <!-- ✅ SHOW SELECTED TICKETS -->
    <h5 class="font-weight-bold mb-2 text-dark" style="font-size: 1rem;">🎟 Selected Tickets:</h5>
    
    <div class="tickets-container" id="ticketsContainer">

    </div>
    
    <p class="mt-2 text-dark mb-4" style="font-size: 1rem;">
        Total Tickets: <b class="text-primary" style="font-size: 1.1rem;" id="totalTickets">0</b>
    </p>
    
    <form action="upipay.php" method="post" onsubmit="return validateForm()">
      <!-- ✅ HIDDEN INPUT -->

      <!-- FULL NAME -->
      <div class="form-group mb-3">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" class="form-control" placeholder="Enter your full name" required>
      </div>
      
      <!-- MOBILE -->
      <div class="form-group mb-3">
        <label for="mobile">Mobile Number</label>
        <input type="tel" id="mobile" name="mobile" maxlength="10" class="form-control" placeholder="Enter 10-digit mobile number" required pattern="[0-9]{10}" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      </div>
      
      <!-- STATE -->
      <div class="form-group mb-3">
        <label for="state">Choose State</label>
        <select id="state" name="state" class="form-control" required>
          <option value="">Choose State</option>
          <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
          <option value="Andhra Pradesh">Andhra Pradesh</option>
          <option value="Arunachal Pradesh">Arunachal Pradesh</option>
          <option value="Assam">Assam</option>
          <option value="Bihar">Bihar</option>
          <option value="Chandigarh">Chandigarh</option>
          <option value="Chhattisgarh">Chhattisgarh</option>
          <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra and Nagar Haveli and Daman and Diu</option>
          <option value="Delhi">Delhi</option>
          <option value="Goa">Goa</option>
          <option value="Gujarat">Gujarat</option>
          <option value="Haryana">Haryana</option>
          <option value="Himachal Pradesh">Himachal Pradesh</option>
          <option value="Jammu and Kashmir">Jammu and Kashmir</option>
          <option value="Jharkhand">Jharkhand</option>
          <option value="Karnataka">Karnataka</option>
          <option value="Kerala">Kerala</option>
          <option value="Ladakh">Ladakh</option>
          <option value="Lakshadweep">Lakshadweep</option>
          <option value="Madhya Pradesh">Madhya Pradesh</option>
          <option value="Maharashtra">Maharashtra</option>
          <option value="Manipur">Manipur</option>
          <option value="Meghalaya">Meghalaya</option>
          <option value="Mizoram">Mizoram</option>
          <option value="Nagaland">Nagaland</option>
          <option value="Odisha">Odisha</option>
          <option value="Puducherry">Puducherry</option>
          <option value="Punjab">Punjab</option>
          <option value="Rajasthan">Rajasthan</option>
          <option value="Sikkim">Sikkim</option>
          <option value="Tamil Nadu">Tamil Nadu</option>
          <option value="Telangana">Telangana</option>
          <option value="Tripura">Tripura</option>
          <option value="Uttar Pradesh">Uttar Pradesh</option>
          <option value="Uttarakhand">Uttarakhand</option>
          <option value="West Bengal">West Bengal</option>
        </select>
      </div>
      
      <!-- PINCODE -->
      <div class="form-group mb-4">
        <label for="pincode">Pin Code</label>

  <!-- jQuery & Client-side URL Parameter Parsing Script -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
  <script>
    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    $(document).ready(function() {
        // Parse ticket parameter from URL
        const urlParams = new URLSearchParams(window.location.search);
        const ticketParam = urlParams.get('ticket') || '';
        
        // Split and filter tickets
        const tickets = ticketParam.split(',').map(t => t.trim()).filter(t => t.length > 0);
        
        // Render tickets in container
        const container = $('#ticketsContainer');
        if (tickets.length > 0) {
            let html = tickets.map(t => `<span class="ticket-box">${escapeHtml(t)}</span>`).join('');
            container.html(html);
        } else {
            container.html('<span class="text-muted" style="font-size: 0.95rem;">No tickets selected. Please go back and select a ticket.</span>');
        }
        
        // Update total tickets count
        $('#totalTickets').text(tickets.length);
        
        // Set hidden input value
        $('#ticketNoInput').val(ticketParam);
    });

    function validateForm() {
        let name = $('#fullname').val().trim();
        let mobile = $('#mobile').val().trim();
        let pincode = $('#pincode').val().trim();
        
        if (name.length < 2) {
            alert("Please enter a valid Full Name.");
            return false;
        }
        if (mobile.length !== 10) {
            alert("Mobile Number must be exactly 10 digits.");
            return false;
        }
        if (pincode.length !== 6) {
            alert("Pin Code must be exactly 6 digits.");
            return false;
        }
        return true;
    }
  </script>
</body>
</html>
